<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ritense Planning Poker</title>
  <link rel="icon" href="ritense-logo.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Join screen (no auth — just a display name + session) -->
  <div id="login" class="login">
    <form id="login-form" class="login-card">
      <img src="ritense-logo.svg" alt="ritense" class="login-logo" />
      <h1>Planning Poker</h1>
      <p class="subtitle">Estimate together, in real time.</p>
      <label>
        Your name
        <input id="name-input" type="text" placeholder="e.g. Peter" maxlength="40" autocomplete="name" required />
      </label>
      <label>
        Session / room
        <input id="room-input" type="text" placeholder="e.g. sprint-42" maxlength="60" required />
      </label>
      <button type="submit">Join session</button>
      <p id="config-warning" class="config-warning hidden">
        ⚠️ Supabase is not configured yet — set your URL and anon key in <code>config.js</code>.
      </p>
    </form>
  </div>

  <!-- Session screen -->
  <div id="session" class="session hidden">
    <header class="topbar">
      <img src="ritense-logo.svg" alt="ritense" class="topbar-logo" />
      <div class="room-info">
        <span class="room-label">Session</span>
        <span id="room-name" class="room-name"></span>
      </div>
      <div class="topbar-actions">
        <button id="spectator-btn" class="ghost">👀 Spectate</button>
        <button id="leave-btn" class="ghost">Leave</button>
      </div>
    </header>

    <div class="layout">
      <main class="table-area">
        <div id="item-bar" class="item-bar"></div>

        <div id="participants" class="participants"></div>

        <div class="center-controls">
          <div id="status" class="status"></div>
          <div id="controls" class="controls"></div>
          <div id="results" class="results hidden"></div>
        </div>

        <div class="deck-area">
          <p id="deck-hint" class="deck-hint">Pick your card</p>
          <div id="deck" class="deck"></div>
        </div>
      </main>

      <aside id="history" class="history-sidebar">
        <h2 class="history-heading">This session</h2>
        <div id="history-list" class="history-list"></div>
      </aside>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
